name: pricingRule
type: base
id: pbc_pricingrul

fields:
  - name: name
    type: text
    max: 255
    required: true

  - name: margin
    type: number

  - name: overhead
    type: number

  - name: default
    type: bool

  - name: tax
    type: number

  - name: created
    type: autodate
    onCreate: true
    onUpdate: false

  - name: updated
    type: autodate
    onCreate: true
    onUpdate: true
