name: changelog
type: base
id: pbc_changelog0

fields:
  - name: collection
    type: text
    required: true

  - name: record
    type: text

  - name: changeType
    type: select
    required: true
    values:
      - create
      - update
      - delete

  - name: changedBy
    type: relation
    collectionId: _pb_users_auth_
    maxSelect: 1
    minSelect: 0

  - name: reason
    type: text

  - name: created
    type: autodate
    onCreate: true
    onUpdate: false

  - name: updated
    type: autodate
    onCreate: true
    onUpdate: true
