name: permission
type: base
id: pbc_permission

fields:
  - name: name
    type: text
    max: 255
    required: true

  - name: collections
    type: json

  - name: canView
    type: bool

  - name: canList
    type: bool

  - name: canCreate
    type: bool

  - name: canUpdate
    type: bool

  - name: canDelete
    type: bool

  - name: created
    type: autodate
    onCreate: true
    onUpdate: false

  - name: updated
    type: autodate
    onCreate: true
    onUpdate: true
